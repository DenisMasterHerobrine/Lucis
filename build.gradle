plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

def scalableLuxVersion = '0.1.0.1+neoforge.1cb1e91'
def scalableLuxJarName = "ScalableLux-${scalableLuxVersion}-all.jar"
def scalableLuxDownloadUrl = 'https://cdn.modrinth.com/data/Ps1zyz6x/versions/j10HNoNf/ScalableLux-0.1.0.1%2Bneoforge.1cb1e91-all.jar'
def scalableLuxJar = layout.buildDirectory.file("downloads/${scalableLuxJarName}")
def benchmarkLevelSeedValue = providers.gradleProperty('benchmarkLevelSeed').getOrElse('lucis-benchmark-seed')
def benchmarkDefaultOutput = layout.buildDirectory.file('reports/lucis-light-benchmark.jsonl').get().asFile.absolutePath.replace('\\', '/')
def scalableLuxDependencyType = providers.gradleProperty('benchmarkAllowScalableLux')
        .map { it.toBoolean() ? 'discouraged' : 'incompatible' }
        .getOrElse('incompatible')

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    maven {
        name = 'CurseMaven'
        url = 'https://www.cursemaven.com'
        content {
            includeGroup 'curse.maven'
        }
    }
}

base {
    archivesName = "${mod_id}-${minecraft_version}"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers.add('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()
        }

        clientMeasure {
            client()
            gameDirectory = project.file('run')
            systemProperty 'lucis.clientMeasure', 'true'
            systemProperty 'lucis.debug', 'true'
            systemProperty 'lucis.enabled', providers.gradleProperty('clientMeasureLucisEnabled').getOrElse('true')
            systemProperty 'forge.logging.console.level', 'info'
            programArgument '--quickPlaySingleplayer'
            programArgument providers.gradleProperty('clientMeasureWorld').getOrElse('New World (5)')
            jvmArgument '-Xmx3G'
        }

        server {
            server()
            programArgument '--nogui'
        }

        def configureBenchmarkRun = { runConfig, String runDir, String mode, boolean lucisEnabled, String expectedMod = '' ->
            runConfig.server()
            runConfig.gameDirectory = project.file(runDir)
            runConfig.programArgument '--nogui'
            runConfig.systemProperty 'lucis.benchmark', 'true'
            runConfig.systemProperty 'lucis.debug', 'true'
            runConfig.systemProperty 'lucis.benchmark.mode', mode
            runConfig.systemProperty 'lucis.benchmark.expectedMod', expectedMod
            runConfig.systemProperty 'lucis.benchmark.workload', providers.gradleProperty('benchmarkWorkload').getOrElse('block_toggle_dense')
            runConfig.systemProperty 'lucis.benchmark.output', providers.gradleProperty('benchmarkOutput').getOrElse(benchmarkDefaultOutput)
            runConfig.systemProperty 'lucis.benchmark.radiusChunks', providers.gradleProperty('benchmarkRadiusChunks').getOrElse('3')
            runConfig.systemProperty 'lucis.benchmark.chunkSpan', providers.gradleProperty('benchmarkChunkSpan').getOrElse('0')
            runConfig.systemProperty 'lucis.benchmark.structureSize', providers.gradleProperty('benchmarkStructureSize').getOrElse('16')
            runConfig.systemProperty 'lucis.benchmark.structureWidth', providers.gradleProperty('benchmarkStructureWidth').getOrElse(providers.gradleProperty('benchmarkStructureSize').getOrElse('16'))
            runConfig.systemProperty 'lucis.benchmark.structureHeight', providers.gradleProperty('benchmarkStructureHeight').getOrElse(providers.gradleProperty('benchmarkStructureSize').getOrElse('16'))
            runConfig.systemProperty 'lucis.benchmark.structureDepth', providers.gradleProperty('benchmarkStructureDepth').getOrElse(providers.gradleProperty('benchmarkStructureSize').getOrElse('16'))
            runConfig.systemProperty 'lucis.benchmark.maxApplyBlocks', providers.gradleProperty('benchmarkMaxApplyBlocks').getOrElse('0')
            runConfig.systemProperty 'lucis.benchmark.skipPreparation', providers.gradleProperty('benchmarkSkipPreparation').getOrElse('false')
            runConfig.systemProperty 'lucis.benchmark.lightOnly', providers.gradleProperty('benchmarkLightOnly').getOrElse('false')
            runConfig.systemProperty 'lucis.benchmark.trackRegionAnchorsOnly', providers.gradleProperty('benchmarkTrackRegionAnchorsOnly').getOrElse('false')
            runConfig.systemProperty 'lucis.benchmark.prepareMaxTicks', providers.gradleProperty('benchmarkPrepareMaxTicks').getOrElse('0')
            runConfig.systemProperty 'lucis.benchmark.originX', providers.gradleProperty('benchmarkOriginX').getOrElse('0')
            runConfig.systemProperty 'lucis.benchmark.originZ', providers.gradleProperty('benchmarkOriginZ').getOrElse('0')
            runConfig.systemProperty 'lucis.benchmark.y', providers.gradleProperty('benchmarkY').getOrElse('80')
            runConfig.systemProperty 'lucis.benchmark.passes', providers.gradleProperty('benchmarkPasses').getOrElse('6')
            runConfig.systemProperty 'lucis.benchmark.warmupPasses', providers.gradleProperty('benchmarkWarmupPasses').getOrElse('2')
            runConfig.systemProperty 'lucis.benchmark.settleTicks', providers.gradleProperty('benchmarkSettleTicks').getOrElse('20')
            runConfig.systemProperty 'lucis.benchmark.maxWaitNanos', providers.gradleProperty('benchmarkMaxWaitNanos').getOrElse('120000000000')
            runConfig.systemProperty 'lucis.enabled', String.valueOf(lucisEnabled)
            runConfig.systemProperty 'lucis.regionChunks', '1'
            runConfig.systemProperty 'lucis.haloChunks', '0'
            runConfig.systemProperty 'lucis.maxBatchChunks', providers.gradleProperty('lucisMaxBatchChunks').getOrElse('64')
            runConfig.systemProperty 'lucis.maxCachedRegions', providers.gradleProperty('lucisMaxCachedRegions').getOrElse('128')
            runConfig.systemProperty 'lucis.worldgenWorkers', providers.gradleProperty('lucisWorldgenWorkers').getOrElse('0')
            runConfig.systemProperty 'lucis.runtimeWorkers', providers.gradleProperty('lucisRuntimeWorkers').getOrElse('0')
            runConfig.systemProperty 'lucis.runtimeRegionChunks', providers.gradleProperty('lucisRuntimeRegionChunks').getOrElse('1')
            runConfig.systemProperty 'lucis.runtime.fullRelightChangeThreshold', providers.gradleProperty('lucisRuntimeFullRelightChangeThreshold').getOrElse('2048')
            runConfig.systemProperty 'lucis.runtime.fullRelightCoalesceNanos', providers.gradleProperty('lucisRuntimeFullRelightCoalesceNanos').getOrElse('5000000000')
            runConfig.systemProperty 'forge.logging.console.level', 'info'
            runConfig.jvmArgument '-Xmx2G'
        }

        benchmarkServer {
            configureBenchmarkRun(delegate, 'run-benchmark-lucis', 'lucis', true)
        }

        benchmarkVanillaServer {
            configureBenchmarkRun(delegate, 'run-benchmark-vanilla', 'vanilla', false)
        }

        benchmarkScalableLuxServer {
            configureBenchmarkRun(delegate, 'run-benchmark-scalablelux', 'scalablelux', false, 'scalablelux')
        }

        benchmarkGeneratorAcceleratorServer {
            configureBenchmarkRun(delegate, 'run-benchmark-generator-accelerator', 'lucis+generator_accelerator', true, 'generator_accelerator')
        }

        benchmarkGeneratorAcceleratorOnlyServer {
            configureBenchmarkRun(delegate, 'run-benchmark-generator-accelerator-only', 'generator_accelerator', false, 'generator_accelerator')
        }

        benchmarkC2meServer {
            configureBenchmarkRun(delegate, 'run-benchmark-c2me', 'lucis+c2me', true, 'c2me')
        }

        benchmarkC2meOnlyServer {
            configureBenchmarkRun(delegate, 'run-benchmark-c2me-only', 'c2me', false, 'c2me')
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }


dependencies {
    // Example mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-forge-api:${jei_version}"
    // runtimeOnly "mezz.jei:jei-${mc_version}-forge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html

    compileOnly('curse.maven:sable-1312371:8263584') {
        transitive = false
    }

    testImplementation platform('org.junit:junit-bom:5.10.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

tasks.register('downloadScalableLuxJar') {
    outputs.file(scalableLuxJar)
    doLast {
        File jarFile = scalableLuxJar.get().asFile
        if (jarFile.exists()) {
            return
        }
        jarFile.parentFile.mkdirs()
        new URL(scalableLuxDownloadUrl).withInputStream { input ->
            jarFile.withOutputStream { output ->
                output << input
            }
        }
    }
}

tasks.register('prepareBenchmarkScalableLuxMods', Sync) {
    dependsOn tasks.named('prepareBenchmarkScalableLuxServerRun')
    dependsOn tasks.named('downloadScalableLuxJar')
    from(scalableLuxJar)
    into(file('run-benchmark-scalablelux/mods'))
}

tasks.register('prepareBenchmarkGeneratorAcceleratorMods', Sync) {
    dependsOn tasks.named('prepareBenchmarkGeneratorAcceleratorServerRun')
    from(fileTree('mods') { include '*Generator Accelerator*.jar' })
    into(file('run-benchmark-generator-accelerator/mods'))
}

tasks.register('prepareBenchmarkGeneratorAcceleratorOnlyMods', Sync) {
    dependsOn tasks.named('prepareBenchmarkGeneratorAcceleratorOnlyServerRun')
    from(fileTree('mods') { include '*Generator Accelerator*.jar' })
    into(file('run-benchmark-generator-accelerator-only/mods'))
}

tasks.register('prepareBenchmarkC2meMods', Sync) {
    dependsOn tasks.named('prepareBenchmarkC2meServerRun')
    from(fileTree('mods') { include 'c2me-*.jar' })
    into(file('run-benchmark-c2me/mods'))
}

tasks.register('prepareBenchmarkC2meOnlyMods', Sync) {
    dependsOn tasks.named('prepareBenchmarkC2meOnlyServerRun')
    from(fileTree('mods') { include 'c2me-*.jar' })
    into(file('run-benchmark-c2me-only/mods'))
}

def registerBenchmarkServerPropertiesTask = { String taskName, String runDirectory, String mode, int serverPort ->
    def serverPropertiesFile = file("${runDirectory}/server.properties")
    tasks.register(taskName) {
        outputs.file(serverPropertiesFile)
        inputs.property('mode', mode)
        inputs.property('serverPort', serverPort)
        inputs.property('benchmarkLevelSeed', benchmarkLevelSeedValue)

        doLast {
            serverPropertiesFile.parentFile.mkdirs()
            serverPropertiesFile.text = """
online-mode=false
server-port=${serverPort}
max-tick-time=-1
motd=Lucis Benchmark ${mode}
level-seed=${benchmarkLevelSeedValue}
""".stripIndent().trim() + System.lineSeparator()
        }
    }
}

registerBenchmarkServerPropertiesTask('prepareBenchmarkVanillaServerProperties', 'run-benchmark-vanilla', 'vanilla', 25665)
registerBenchmarkServerPropertiesTask('prepareBenchmarkScalableLuxServerProperties', 'run-benchmark-scalablelux', 'scalablelux', 25666)
registerBenchmarkServerPropertiesTask('prepareBenchmarkLucisServerProperties', 'run-benchmark-lucis', 'lucis', 25667)
registerBenchmarkServerPropertiesTask('prepareBenchmarkGeneratorAcceleratorServerProperties', 'run-benchmark-generator-accelerator', 'lucis+generator_accelerator', 25668)
registerBenchmarkServerPropertiesTask('prepareBenchmarkC2meServerProperties', 'run-benchmark-c2me', 'lucis+c2me', 25669)
registerBenchmarkServerPropertiesTask('prepareBenchmarkGeneratorAcceleratorOnlyServerProperties', 'run-benchmark-generator-accelerator-only', 'generator_accelerator', 25670)
registerBenchmarkServerPropertiesTask('prepareBenchmarkC2meOnlyServerProperties', 'run-benchmark-c2me-only', 'c2me', 25671)

tasks.named('runBenchmarkScalableLuxServer').configure {
    dependsOn tasks.named('prepareBenchmarkScalableLuxMods'), tasks.named('prepareBenchmarkScalableLuxServerProperties')
}

tasks.named('runBenchmarkVanillaServer').configure {
    dependsOn tasks.named('prepareBenchmarkVanillaServerProperties')
}

tasks.named('runBenchmarkServer').configure {
    dependsOn tasks.named('prepareBenchmarkLucisServerProperties')
}

tasks.named('runBenchmarkGeneratorAcceleratorServer').configure {
    dependsOn tasks.named('prepareBenchmarkGeneratorAcceleratorMods'), tasks.named('prepareBenchmarkGeneratorAcceleratorServerProperties')
}

tasks.named('runBenchmarkGeneratorAcceleratorOnlyServer').configure {
    dependsOn tasks.named('prepareBenchmarkGeneratorAcceleratorOnlyMods'), tasks.named('prepareBenchmarkGeneratorAcceleratorOnlyServerProperties')
}

tasks.named('runBenchmarkC2meServer').configure {
    dependsOn tasks.named('prepareBenchmarkC2meMods'), tasks.named('prepareBenchmarkC2meServerProperties')
}

tasks.named('runBenchmarkC2meOnlyServer').configure {
    dependsOn tasks.named('prepareBenchmarkC2meOnlyMods'), tasks.named('prepareBenchmarkC2meOnlyServerProperties')
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description,
                             scalablelux_dependency_type: scalableLuxDependencyType]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

