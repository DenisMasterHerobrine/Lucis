license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="sable"
type="optional"
reason="When Sable is present, Lucis defers to Sable plot lighting where available."
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="starlight"
type="incompatible"
reason="Lucis replaces the light engine and is incompatible with Starlight."
versionRange="[0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="scalablelux"
type="${scalablelux_dependency_type}"
reason="Lucis replaces the light engine and is incompatible with ScalableLux."
versionRange="[0,)"
ordering="NONE"
side="BOTH"
