modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
credits = "${credits}"
authors = "${mod_author}"
description = '''${description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "sable"
type = "optional"
reason = "When Sable is present, Lucis defers to Sable's per-plot light engines to avoid light engine conflicts."
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "starlight"
type = "incompatible"
reason = "Lucis replaces the light engine and is incompatible with Starlight. Remove one of the two mods."
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "scalablelux"
type = "${scalablelux_dependency_type}"
reason = "Lucis replaces the light engine and is incompatible with ScalableLux. Remove one of the two mods."
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"